<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Noise Beats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../nav.css">
    <style>
        :root {
            --bg-color: #000000;
            --fg-color: #ffffff;
            --accent-color: #333333;
            --font-family: 'Josefin Sans', sans-serif;
        }

   
           
     

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--fg-color);
            font-family: var(--font-family);
            overflow: hidden;
            touch-action: none;

        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;

        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }





        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        .top-controls {
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: auto;
            padding-top: 35px;
        }

        .bottom-controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            margin-bottom: 20px;
        }


        .pattern-indicator {
            display: flex;
            gap: 4px;
        }

        .pattern-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            transition: all 0.1s;
        }

        .pattern-dot.active {
            background: #fff;
            transform: scale(1.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }


        .slider-container {
            width: 80%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            padding: 16px 0;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background: var(--fg-color);
            cursor: pointer;
            margin-top: -4px;

        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: #333;
        }

        input[type="range"]::-moz-range-thumb {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            border: none;
            background: var(--fg-color);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-track {
            height: 2px;
            background: #333;
        }





        #touch-marker {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        #touch-marker.active {
            display: block;
            animation: ripple 1s infinite;
        }

        @keyframes ripple {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }
    </style>
    <script src="../nav.js"></script>
</head>

<body>
    <div id="init-overlay">
        <button class="start-btn">INITIALISE</button>
    </div>

    <div id="persistent-nav">
        <button class="nav-btn" onclick="goToMenu()">M</button>
        <button class="nav-btn" onclick="goToRandom()">R</button>
    </div>

        <div id="app">
        <canvas id="visualizer"></canvas>
        <div id="touch-marker"></div>

        <div id="ui-layer">
            <div class="title-block">
                <div class="title">DRUH</div>
                <div class="subtitle">NOISE BEATS</div>
            </div>
            <div class="top-controls">
                <div class="pattern-indicator" id="pattern-indicator">
                    <!-- Dots generated by JS -->
                </div>
            </div>

            <div class="bottom-controls">
                <div class="slider-container">
                    <label for="bpm">TEMPO <span id="bpm-val">120</span></label>
                    <input type="range" id="bpm" min="60" max="200" step="1" value="120">
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx;
        let isPlaying = false;
        let isTouching = false;

        let leftNoise, rightNoise;
        let leftFilter, rightFilter;
        let leftGain, rightGain;
        let merger;
        let panner;
        let masterGain;
        let analyser;
        let barRepeatDelay;
        let barRepeatDry;
        let barRepeatWet;
        let barRepeatWetLP;
        let masterTilt;
        let masterGlue;

        let schedulerTimer;
        let nextNoteTime = 0.0;
        let lookahead = 25.0;
        let scheduleAheadTime = 0.1;
        let noteCount = 0;

        let bpm = 120;

        let density = 0;
        let quantize = 0;
        let filterFreq = 100;
        let filterQ = 0.001;
        let stereoWidth = 0;
        let panVal = 0;

        let currentRate = 16;
        let rateDivider = 4;
        let currentFilterType = 'bandpass';

        let surfaceAggro = 0;
        let moveExcite = 0;
        let lastPointer = { x: 0.5, y: 0.5, t: performance.now() };

        const noiseAlgorithms = {
            vinylCrackle: (function () {
                let burstLevel = 0;
                let burstDecay = 0;
                let burstCounter = 0;

                return function () {
                    const spawnChance = 0.08 + surfaceAggro * 0.45;
                    if (Math.random() < spawnChance) {
                        const hot = 1 + surfaceAggro * 4.0;
                        burstLevel = (Math.random() * 0.5 + 0.5) * 6.0 * hot;
                        burstDecay = 0.94 + (Math.random() * 0.04);
                        burstCounter = Math.floor((Math.random() * 60 + 20) * (1.0 + surfaceAggro * 1.5));
                    }

                    if (burstCounter > 0) {
                        burstCounter--;
                        const noise = (Math.random() * 2 - 1) * burstLevel;
                        burstLevel *= burstDecay;
                        return noise;
                    }
                    const bed = 0.05 + surfaceAggro * 0.2;
                    return (Math.random() * 2 - 1) * bed;
                };
            })()
        };

        const initOverlay = document.getElementById('init-overlay');
        const bpmInput = document.getElementById('bpm');
        const bpmVal = document.getElementById('bpm-val');
        const patternIndicator = document.getElementById('pattern-indicator');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const touchMarker = document.getElementById('touch-marker');

        function initPatternDots() {
            patternIndicator.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const dot = document.createElement('div');
                dot.className = 'pattern-dot';
                patternIndicator.appendChild(dot);
            }
        }
        initPatternDots();

        function beatDurationSec() {
            return 60 / bpm;
        }

        function updateBarRepeatDelay() {
            if (!audioCtx || !barRepeatDelay) return;
            const quarterNoteSec = beatDurationSec();
            barRepeatDelay.delayTime.setTargetAtTime(Math.min(quarterNoteSec, 3.95), audioCtx.currentTime, 0.05);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createNoiseSource(algorithm) {
            const bufferSize = 4096;
            const noiseProcessor = audioCtx.createScriptProcessor(bufferSize, 1, 1);
            noiseProcessor.onaudioprocess = function (event) {
                const output = event.outputBuffer.getChannelData(0);
                for (let i = 0; i < output.length; i++) {
                    output[i] = algorithm();
                }
            };
            return noiseProcessor;
        }

        async function initAudio() {
            if (audioCtx) return;

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                leftNoise = createNoiseSource(noiseAlgorithms.vinylCrackle);
                rightNoise = createNoiseSource(noiseAlgorithms.vinylCrackle);

                leftFilter = audioCtx.createBiquadFilter();
                leftFilter.type = 'bandpass';
                rightFilter = audioCtx.createBiquadFilter();
                rightFilter.type = 'bandpass';

                leftGain = audioCtx.createGain();
                rightGain = audioCtx.createGain();
                leftGain.gain.value = 0;
                rightGain.gain.value = 0;

                merger = audioCtx.createChannelMerger(2);
                panner = audioCtx.createStereoPanner();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0;

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.8;

                leftNoise.connect(leftFilter);
                leftFilter.connect(leftGain);
                leftGain.connect(merger, 0, 0);

                rightNoise.connect(rightFilter);
                rightFilter.connect(rightGain);
                rightGain.connect(merger, 0, 1);

                merger.connect(panner);

                masterTilt = audioCtx.createBiquadFilter();
                masterTilt.type = 'highshelf';
                masterTilt.frequency.value = 2400;
                masterTilt.Q.value = 0.55;
                masterTilt.gain.value = 0;

                masterGlue = audioCtx.createWaveShaper();
                const glueSamples = 256;
                const glueCurve = new Float32Array(glueSamples);
                for (let i = 0; i < glueSamples; i++) {
                    const x = (i * 2) / (glueSamples - 1) - 1;
                    glueCurve[i] = Math.tanh(x * 1.35) * 0.92;
                }
                masterGlue.curve = glueCurve;
                masterGlue.oversample = '2x';

                panner.connect(masterTilt);
                masterTilt.connect(masterGlue);

                barRepeatDelay = audioCtx.createDelay(4.0);
                barRepeatDelay.delayTime.value = Math.min(beatDurationSec(), 3.95);
                barRepeatDry = audioCtx.createGain();
                barRepeatDry.gain.value = 1;
                barRepeatWetLP = audioCtx.createBiquadFilter();
                barRepeatWetLP.type = 'lowpass';
                barRepeatWetLP.frequency.value = 3200;
                barRepeatWetLP.Q.value = 0.7;
                barRepeatWet = audioCtx.createGain();
                barRepeatWet.gain.value = 1.72;

                masterGlue.connect(barRepeatDry);
                masterGlue.connect(barRepeatDelay);
                barRepeatDelay.connect(barRepeatWetLP);
                barRepeatWetLP.connect(barRepeatWet);
                barRepeatDry.connect(masterGain);
                barRepeatWet.connect(masterGain);

                updateBarRepeatDelay();

                masterGain.connect(analyser);
                analyser.connect(audioCtx.destination);

                console.log('Audio initialized');
            } catch (e) {
                console.error('Audio init failed', e);
            }
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            const secondsPer64th = secondsPerBeat / 16;
            nextNoteTime += secondsPer64th;
            noteCount++;
        }

        function getPatternValue(position, channel) {
            const step16 = Math.floor(position / 4) % 16;

            const widthOffset = Math.floor((stereoWidth / 100) * 8);

            const leftPattern = [1.0, 0.2, 0.6, 0.1, 0.8, 0.1, 0.4, 0.3, 0.9, 0.3, 0.7, 0.2, 0.6, 0.4, 0.5, 0.1];
            const rightPattern = [0.1, 0.8, 0.2, 0.7, 0.3, 0.9, 0.1, 0.6, 0.2, 0.7, 0.3, 0.8, 0.4, 0.5, 0.6, 0.2];

            const pattern = channel === 'left' ? leftPattern : rightPattern;
            const shiftedPos = (step16 + (channel === 'right' ? widthOffset : 0)) % 16;
            return pattern[shiftedPos];
        }

        function scheduleNote(time) {
            if (!isTouching) return;

            if (noteCount % rateDivider !== 0) return;

            const quantizeNorm = quantize / 100;
            const ex = moveExcite;

            const continuousProb = (1 - quantizeNorm) * 2.5 + ex * 0.55;

            const leftValue = getPatternValue(noteCount, 'left');
            const rightValue = getPatternValue(noteCount, 'right');

            const leftContinuous = Math.random() < continuousProb;
            const rightContinuous = Math.random() < continuousProb;

            const rhythmBias = 1 + ex * 0.45;
            const leftRhythmic = (Math.random() * 100) < (density * leftValue * quantizeNorm * rhythmBias);
            const rightRhythmic = (Math.random() * 100) < (density * rightValue * quantizeNorm * rhythmBias);

            const leftShouldPlay = leftContinuous || leftRhythmic;
            const rightShouldPlay = rightContinuous || rightRhythmic;

            if (leftFilter.type !== currentFilterType) {
                leftFilter.type = currentFilterType;
                rightFilter.type = currentFilterType;
            }
            const qExcite = filterQ * (1 + ex * 2.8);
            leftFilter.Q.value = qExcite;
            rightFilter.Q.value = qExcite;

            if (panner) {
                panner.pan.setTargetAtTime(panVal, time, 0.05);
            }

            const duration = (60 / bpm / 16) * rateDivider;
            const gainExcite = 0.68 + ex * 0.95;

            if (leftShouldPlay) {
                const jitter = (Math.random() * 2 - 1) * (0.004 + ex * 0.012);
                const triggerTime = time + jitter;

                let baseGain = leftContinuous ?
                    0.4 * (1 - quantizeNorm) :
                    leftValue * quantizeNorm * 5.0;
                baseGain *= gainExcite * (1.08 + surfaceAggro * 0.22);

                const filterBoost = 1.0 + (leftValue * 0.8 * quantizeNorm);

                leftFilter.frequency.cancelScheduledValues(triggerTime);
                leftFilter.frequency.setValueAtTime(filterFreq * filterBoost, triggerTime);
                leftFilter.frequency.exponentialRampToValueAtTime(Math.max(filterFreq, 20), triggerTime + (duration * (0.42 + ex * 0.18)));

                leftGain.gain.cancelScheduledValues(triggerTime);
                leftGain.gain.setValueAtTime(baseGain, triggerTime);

                const decayTime = leftContinuous ? duration * 2 :
                    (rateDivider >= 4 ? duration * 0.4 : duration * (0.5 + Math.random()));
                leftGain.gain.exponentialRampToValueAtTime(0.001, triggerTime + decayTime);
            }

            if (rightShouldPlay) {
                const jitter = (Math.random() * 2 - 1) * (0.004 + ex * 0.012);
                const triggerTime = time + jitter;

                let baseGain = rightContinuous ?
                    0.4 * (1 - quantizeNorm) :
                    rightValue * quantizeNorm * 5.0;
                baseGain *= gainExcite * (1.08 + surfaceAggro * 0.22);

                const filterBoost = 1.0 + (rightValue * 0.8 * quantizeNorm);

                rightFilter.frequency.cancelScheduledValues(triggerTime);
                rightFilter.frequency.setValueAtTime(filterFreq * filterBoost, triggerTime);
                rightFilter.frequency.exponentialRampToValueAtTime(Math.max(filterFreq, 20), triggerTime + (duration * (0.42 + ex * 0.18)));

                rightGain.gain.cancelScheduledValues(triggerTime);
                rightGain.gain.setValueAtTime(baseGain, triggerTime);

                const decayTime = rightContinuous ? duration * 2 :
                    (rateDivider >= 4 ? duration * 0.4 : duration * (0.5 + Math.random()));
                rightGain.gain.exponentialRampToValueAtTime(0.001, triggerTime + decayTime);
            }

            updatePatternIndicator();
        }

        function updatePatternIndicator() {
            requestAnimationFrame(() => {
                const step16 = Math.floor(noteCount / 4) % 16;
                const dots = patternIndicator.children;
                for (let i = 0; i < dots.length; i++) {
                    if (i === step16) {
                        dots[i].classList.add('active');
                    } else {
                        dots[i].classList.remove('active');
                    }
                }
            });
        }

        function scheduler() {
            if (!isPlaying) return;
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(nextNoteTime);
                nextNote();
            }
            schedulerTimer = setTimeout(scheduler, lookahead);
        }


        function updateParamsFromInput(x, y) {
            const centerX = 0.5;
            const centerY = 0.5;

            const dx = x - centerX;
            const dy = y - centerY;

            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);

            const now = performance.now();
            const dt = Math.max(10, now - lastPointer.t);
            const step = Math.hypot(x - lastPointer.x, y - lastPointer.y);
            const speed = Math.min(4.5, (step / dt) * 900);
            moveExcite = Math.min(1, moveExcite * 0.86 + speed * 0.24);
            lastPointer = { x, y, t: now };

            if (dist < 0.15) {
                rateDivider = 16;
            } else if (dist < 0.35) {
                rateDivider = 8;
            } else if (dist < 0.6) {
                rateDivider = 4;
            } else if (dist < 0.8) {
                rateDivider = 2;
            } else {
                rateDivider = 1;
            }

            let paramPos = Math.min(dist / 0.52, 1.0);

            density = 82 + (paramPos * 16) + moveExcite * 7;

            quantize = Math.floor((1.0 - Math.pow(paramPos, 1.65)) * 100);

            stereoWidth = 100 - (paramPos * 70);

            if (angle > -Math.PI / 2 && angle <= 0) {
                currentFilterType = 'lowpass';
            } else if (angle > 0 && angle <= Math.PI / 2) {
                currentFilterType = 'bandpass';
            } else if (angle > Math.PI / 2 && angle <= Math.PI) {
                currentFilterType = 'highpass';
            } else {
                currentFilterType = 'notch';
            }

            filterFreq = 150 - (paramPos * 90) + (moveExcite * 15);

            if (rateDivider >= 4) {
                filterQ = 2.0 + (Math.random() * 8.0) + moveExcite * 12.0;
            } else {
                filterQ = 1.0 + (paramPos * 10.0) + moveExcite * 18.0;
            }

            surfaceAggro = Math.min(1, paramPos * 0.55 + moveExcite * 0.65 + (1 - y) * 0.12);

            panVal = (x * 2) - 1;

            if (masterTilt && audioCtx) {
                const tiltDb = -10 + (1 - y) * 8 + moveExcite * 2;
                masterTilt.gain.setTargetAtTime(tiltDb, audioCtx.currentTime, 0.055);
            }

            touchMarker.style.left = (x * 100) + '%';
            touchMarker.style.top = (y * 100) + '%';

            const pulse = 1 + moveExcite * 0.55;
            touchMarker.style.transform = `translate(-50%, -50%) rotate(${angle}rad) scale(${pulse})`;
            touchMarker.style.borderColor = `rgba(255,255,255,${0.22 + moveExcite * 0.45})`;
            touchMarker.style.boxShadow = `0 0 ${12 + moveExcite * 28}px rgba(255,255,255,${0.08 + moveExcite * 0.2})`;
            touchMarker.style.fontSize = "10px";
            touchMarker.style.textAlign = "center";
            touchMarker.style.display = "flex";
            touchMarker.style.justifyContent = "center";
            touchMarker.style.alignItems = "center";
            touchMarker.innerText = '';
        }

        function startInteraction(e) {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isTouching = true;
            touchMarker.classList.add('active');

            if (masterGain) {
                masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                masterGain.gain.setTargetAtTime(1.2, audioCtx.currentTime, 0.1);
            }

            handleMove(e);

            if (!isPlaying) {
                isPlaying = true;
                nextNoteTime = audioCtx.currentTime;
                scheduler();
            }
        }

        function endInteraction() {
            isTouching = false;
            moveExcite = 0;
            surfaceAggro = 0;
            touchMarker.classList.remove('active');

            if (masterGain && audioCtx) {
                const beat = beatDurationSec();
                const tailSec = Math.min(beat * 4 + 0.35, 3.5);
                const now = audioCtx.currentTime;
                masterGain.gain.cancelScheduledValues(now);
                masterGain.gain.setValueAtTime(masterGain.gain.value, now);
                masterGain.gain.linearRampToValueAtTime(0, now + tailSec);
            }
        }

        function handleMove(e) {
            if (!isTouching) return;
            e.preventDefault();

            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const x = clientX / window.innerWidth;
            const y = clientY / window.innerHeight;

            updateParamsFromInput(x, y);
        }

        const app = document.getElementById('app');

        app.addEventListener('mousedown', startInteraction);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', endInteraction);

        app.addEventListener('touchstart', startInteraction, { passive: false });
        app.addEventListener('touchmove', handleMove, { passive: false });
        app.addEventListener('touchend', endInteraction);

        initOverlay.addEventListener('click', async () => {
            await initAudio();
            initOverlay.classList.add('hidden');
            isPlaying = true;
            nextNoteTime = audioCtx.currentTime;
            scheduler();
        });

        bpmInput.addEventListener('input', (e) => {
            bpm = parseInt(e.target.value);
            bpmVal.textContent = bpm;
            updateBarRepeatDelay();
            e.stopPropagation();
        });

        function setBpmFromPointer(e) {
            const rect = bpmInput.getBoundingClientRect();
            const min = parseInt(bpmInput.min);
            const max = parseInt(bpmInput.max);
            const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            const val = Math.round(min + ratio * (max - min));
            bpmInput.value = val;
            bpm = val;
            bpmVal.textContent = bpm;
        }

        bpmInput.addEventListener('pointerdown', (e) => {
            setBpmFromPointer(e);
            bpmInput.setPointerCapture(e.pointerId);
            e.stopPropagation();
        });

        bpmInput.addEventListener('pointermove', (e) => {
            if (e.buttons > 0) {
                setBpmFromPointer(e);
                e.stopPropagation();
            }
        });

        document.querySelector('.bottom-controls').addEventListener('mousedown', (e) => e.stopPropagation());
        document.querySelector('.bottom-controls').addEventListener('touchstart', (e) => e.stopPropagation());


        function draw() {
            requestAnimationFrame(draw);
            if (!analyser) return;

            if (isTouching) {
                moveExcite *= 0.972;
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            const fade = 0.25 + (isTouching ? 0.2 + moveExcite * 0.15 : 0.1);
            ctx.fillStyle = `rgba(0, 0, 0, ${fade})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxR = Math.min(cx, cy);
            const ringBreath = 1 + moveExcite * 0.08 + (isTouching ? 0.03 : 0);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(cx, cy, maxR * 0.5 * ringBreath, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 + moveExcite * 0.06})`;
            ctx.beginPath(); ctx.arc(cx, cy, maxR * 0.9 * ringBreath, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, maxR * 1.08 * ringBreath, 0, Math.PI * 2); ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + maxR, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + maxR); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - maxR, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - maxR); ctx.stroke();

            let rms = 0;
            for (let i = 0; i < bufferLength; i++) {
                const d = dataArray[i] / 128 - 1;
                rms += d * d;
            }
            rms = Math.sqrt(rms / bufferLength);

            ctx.lineWidth = 1.5 + Math.min(rms, 0.6) * 10 + moveExcite * 2;
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.25 + moveExcite * 0.25 + Math.min(rms, 0.6) * 0.4})`;
            ctx.shadowBlur = 4 + moveExcite * 10;
            ctx.shadowColor = 'rgba(255,255,255,0.25)';
            ctx.beginPath();

            const sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                x += sliceWidth;
            }

            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        draw();

    </script>








    <!-- MIDI Integration -->
    <script src="../midi-handler.js"></script>
    <script>
        (function () {
            window.addEventListener('load', () => {
                if (!window.MIDIHandler) {
                    console.error("MIDIHandler not found. Check if ../midi-handler.js is accessible.");
                    return;
                }

                console.log("Setting up MIDI with Centroid Snapping and Integer Mapping for " + document.title);

                // Note Mapping
                window.MIDIHandler.on('noteon', (data) => {
                    if (!audioCtx) return; // Global rule: manual init

                    const cx = 0.5;
                    const cy = 0.5;

                    // MIDI X/Y mapping: Pitch -> Angle, Velocity -> Distance
                    const angle = (data.note / 127) * 2 * Math.PI;
                    const dist = (data.velocity / 127) * 0.5;

                    const x = cx + Math.cos(angle) * dist;
                    const y = cy + Math.sin(angle) * dist;

                    // Simulate touch start/move
                    isTouching = true;
                    touchMarker.classList.add('active');

                    if (masterGain) {
                        masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                        masterGain.gain.setTargetAtTime(1.2, audioCtx.currentTime, 0.1);
                    }

                    updateParamsFromInput(x, y);

                    if (!isPlaying) {
                        isPlaying = true;
                        nextNoteTime = audioCtx.currentTime;
                        scheduler();
                    }
                });

                // Clock Sync
                let clockStartTime = 0;
                window.MIDIHandler.on('beat', (data) => {
                    const now = performance.now();
                    if (clockStartTime > 0) {
                        const duration = (now - clockStartTime) / data.beat;
                        const newBpm = Math.round(60000 / duration);
                        if (newBpm >= 60 && newBpm <= 200) {
                            bpm = newBpm;
                            const bpmInput = document.getElementById('bpm');
                            const bpmVal = document.getElementById('bpm-val');
                            if (bpmInput) bpmInput.value = bpm;
                            if (bpmVal) bpmVal.textContent = bpm;
                            updateBarRepeatDelay();
                        }
                    } else {
                        clockStartTime = now;
                    }
                });

                window.MIDIHandler.on('noteoff', (data) => {
                    endInteraction();
                });

                // CC Mapping
                window.MIDIHandler.on('cc', (data) => {
                    if (data.controller === 1) { // Mod Wheel -> Master Volume
                        if (masterGain) {
                            masterGain.gain.setTargetAtTime(data.value / 127, audioCtx.currentTime, 0.05);
                        }
                    }
                });
            });
        })();
    </script>
